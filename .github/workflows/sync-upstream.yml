name: Sync from upstream
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream "https://github.com/phuryn/pm-skills.git"
          git fetch upstream
          DEF=$(git remote show upstream | awk '/HEAD branch/ {print $NF}')
          git merge --no-edit "upstream/$DEF"
          git push origin HEAD
